[pytest]
# ─── Configuración de pytest para Mapa Interactivo CU UACJ ───────────────────
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Muestra los prints aunque el test pase (útil para depurar)
log_cli = true
log_cli_level = WARNING
